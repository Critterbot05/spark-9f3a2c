<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gina's Boutique 💕</title>
<style>
  :root{
    --pink:#f7c9d6;          /* pinkydinkydoo */
    --pink-deep:#e88aa3;
    --pink-soft:#fdeef2;
    --matcha:#bcd1a6;
    --matcha-deep:#8aa86f;
    --butter:#f6e6a8;
    --cream:#fff9f4;
    --beige:#f3e9df;
    --ink:#3b2f33;
    --ink-soft:#7a6c70;
    --white:#ffffff;
    --shadow:0 8px 24px rgba(180,120,140,.16);
    --shadow-sm:0 3px 10px rgba(180,120,140,.12);
    --radius:22px;
    --radius-sm:14px;
    --serif:'Georgia','Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:var(--sans);color:var(--ink);
    background:linear-gradient(160deg,var(--pink-soft),var(--cream) 40%,var(--beige));
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .hidden{display:none !important;}
  .center{text-align:center;}

  /* ---------- Login / Gate ---------- */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate-card{
    background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:34px 28px;max-width:380px;width:100%;text-align:center;
    border:1px solid rgba(232,138,163,.18);
  }
  .gate-card .logo{font-size:48px;margin-bottom:6px;}
  .gate-card h1{font-size:28px;color:var(--pink-deep);}
  .gate-card p.sub{color:var(--ink-soft);font-size:14px;margin:8px 0 22px;}
  .field{text-align:left;margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
  .field input{
    width:100%;padding:13px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--beige);
    font-size:15px;background:var(--cream);transition:border .2s;
  }
  .field input:focus{outline:none;border-color:var(--pink-deep);background:var(--white);}
  .btn{
    background:var(--pink-deep);color:var(--white);padding:13px 18px;border-radius:999px;
    font-size:15px;font-weight:600;width:100%;box-shadow:var(--shadow-sm);transition:transform .12s,filter .2s;
  }
  .btn:active{transform:scale(.97);}
  .btn:hover{filter:brightness(1.04);}
  .btn.ghost{background:var(--white);color:var(--pink-deep);border:1.5px solid var(--pink);}
  .btn.matcha{background:var(--matcha-deep);}
  .btn.small{width:auto;padding:9px 16px;font-size:13px;}
  .btn.tiny{width:auto;padding:6px 12px;font-size:12px;border-radius:999px;}
  .linkbtn{background:none;color:var(--ink-soft);font-size:13px;text-decoration:underline;padding:8px;width:auto;margin-top:10px;}
  .err{color:#c0455f;font-size:13px;min-height:18px;margin:4px 0;}

  /* ---------- App shell ---------- */
  #app{max-width:1100px;margin:0 auto;padding:0 0 120px;}
  .topbar{
    position:sticky;top:0;z-index:40;background:rgba(255,249,244,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(232,138,163,.15);padding:12px 16px;
  }
  .topbar-row{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;}
  .brand{font-family:var(--serif);font-size:20px;color:var(--pink-deep);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;}
  .brand .heart{display:inline-block;}
  .spacer{flex:1;}
  .pill{
    display:inline-flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--beige);
    border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;box-shadow:var(--shadow-sm);white-space:nowrap;
  }
  .pill .ico{font-size:15px;}
  .pill.credits{background:linear-gradient(120deg,var(--matcha),var(--matcha-deep));color:#23391a;border:none;}
  .pill.points{background:linear-gradient(120deg,var(--butter),#eccb62);color:#5b4a14;border:none;}
  .cart-btn{position:relative;background:var(--pink-deep);color:#fff;border-radius:999px;padding:8px 12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-sm);}
  .cart-badge{position:absolute;top:-6px;right:-6px;background:var(--ink);color:#fff;border-radius:999px;min-width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

  .tier-row{max-width:1100px;margin:8px auto 0;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-soft);}
  .tier-badge{background:var(--pink);color:#7a2f44;border-radius:999px;padding:3px 10px;font-weight:700;font-size:12px;}
  .tier-bar{flex:1;height:7px;background:var(--beige);border-radius:999px;overflow:hidden;}
  .tier-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--pink-deep));border-radius:999px;}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;max-width:1100px;margin:0 auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;background:var(--white);border:1px solid var(--beige);border-radius:999px;
    padding:9px 16px;font-size:14px;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow-sm);transition:.18s;
  }
  .tab.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep);}
  .tab.admin{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab.secret{background:#2a2230;color:#f7c9d6;border-color:#2a2230;}

  /* ---------- Content ---------- */
  .view{padding:8px 16px;max-width:1100px;margin:0 auto;}
  .view-head{margin:14px 4px 6px;}
  .view-head h2{font-size:24px;color:var(--ink);}
  .view-head p{color:var(--ink-soft);font-size:14px;margin:4px 0 0;}

  .subnav{display:flex;gap:7px;flex-wrap:wrap;margin:12px 2px;}
  .chip{background:var(--white);border:1px solid var(--beige);border-radius:999px;padding:6px 13px;font-size:13px;color:var(--ink-soft);font-weight:600;}
  .chip.active{background:var(--matcha);color:#23391a;border-color:var(--matcha);}

  .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:6px;}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:880px){.grid{grid-template-columns:1fr 1fr 1fr;}}

  .card{
    background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);
    padding:16px;display:flex;flex-direction:column;gap:9px;border:1px solid rgba(232,138,163,.1);position:relative;transition:transform .12s,box-shadow .2s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .card.fav::after{content:"⭐";position:absolute;top:12px;right:14px;font-size:15px;}
  .card h3{font-size:17px;line-height:1.25;padding-right:22px;}
  .card .note{font-size:13px;color:var(--ink-soft);line-height:1.4;}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto;}
  .tag{font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;letter-spacing:.3px;}
  .tag.price{background:var(--butter);color:#5b4a14;}
  .tag.cat{background:var(--pink-soft);color:var(--pink-deep);}
  .tag.cost{background:var(--matcha);color:#23391a;}
  .card .add{margin-top:6px;background:var(--pink-deep);color:#fff;border-radius:999px;padding:10px;font-weight:600;font-size:14px;width:100%;}
  .card .add.in{background:var(--matcha-deep);}
  .card-actions{display:flex;gap:6px;margin-top:6px;}
  .card-actions button{flex:1;font-size:12px;padding:7px;border-radius:999px;background:var(--cream);border:1px solid var(--beige);color:var(--ink-soft);font-weight:600;}

  .empty{text-align:center;color:var(--ink-soft);padding:40px 16px;font-size:14px;}

  /* ---------- Cart drawer ---------- */
  .overlay{position:fixed;inset:0;background:rgba(59,47,51,.4);z-index:60;display:flex;justify-content:flex-end;}
  .drawer{background:var(--cream);width:min(420px,100%);height:100%;overflow-y:auto;padding:20px;box-shadow:-10px 0 40px rgba(0,0,0,.18);}
  .drawer h2{font-size:22px;color:var(--pink-deep);margin-bottom:4px;}
  .cart-item{display:flex;align-items:center;gap:10px;background:var(--white);border-radius:var(--radius-sm);padding:12px;margin-top:10px;box-shadow:var(--shadow-sm);}
  .cart-item .ci-name{flex:1;font-size:14px;font-weight:600;}
  .cart-item .ci-cost{font-size:13px;color:var(--matcha-deep);font-weight:700;}
  .cart-item .ci-rm{background:none;color:#c0455f;font-size:18px;width:auto;padding:0 4px;}
  .cart-total{display:flex;justify-content:space-between;align-items:center;margin:18px 0 6px;font-size:16px;font-weight:700;}
  .cart-warn{background:#fde6ec;color:#a13351;border-radius:var(--radius-sm);padding:12px;font-size:13px;margin:10px 0;}

  /* ---------- Modal ---------- */
  .modal-wrap{position:fixed;inset:0;background:rgba(59,47,51,.45);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modal{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal h2{font-size:22px;color:var(--pink-deep);margin-bottom:14px;}
  .modal .field textarea{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--beige);font-size:14px;font-family:inherit;background:var(--cream);min-height:64px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}

  /* ---------- Spinner ---------- */
  .spin-stage{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:14px;}
  .wheel-box{position:relative;width:280px;max-width:80vw;}
  .wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:30px;z-index:5;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}
  canvas#wheel{width:100%;height:auto;display:block;border-radius:50%;box-shadow:var(--shadow);}
  .spin-result{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center;max-width:420px;width:100%;border:2px solid var(--pink);}
  .spin-result h3{font-size:22px;color:var(--pink-deep);}
  .mood-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:6px 0;}

  /* ---------- Sexy ---------- */
  .spice-wrap{background:#2a2230;color:#f7e3ea;border-radius:var(--radius);padding:20px;margin-top:10px;}
  .spice-wrap .slider-label{display:flex;justify-content:space-between;font-size:13px;color:#e8b8c8;margin-bottom:6px;}
  input[type=range]{width:100%;accent-color:var(--pink-deep);height:30px;}
  .spice-card{background:#372d3f;border:1px solid #4a3c54;color:#f7e3ea;}
  .spice-card h3{color:#f7c9d6;}
  .spice-card .note{color:#cdb6c9;}
  .spice-dots{font-size:13px;letter-spacing:2px;}

  /* ---------- We've been here ---------- */
  .stars{font-size:20px;letter-spacing:2px;cursor:pointer;color:var(--pink-deep);}
  .verdict-row{display:flex;gap:6px;flex-wrap:wrap;}
  .verdict{font-size:12px;padding:5px 10px;border-radius:999px;border:1px solid var(--beige);background:var(--cream);color:var(--ink-soft);font-weight:600;}
  .verdict.on-return{background:var(--matcha);color:#23391a;border-color:var(--matcha);}
  .verdict.on-maybe{background:var(--butter);color:#5b4a14;border-color:var(--butter);}
  .verdict.on-never{background:#fde6ec;color:#a13351;border-color:#f3c6d2;}

  /* watchlist */
  .wl-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:10px;margin-top:9px;}
  .wl-item .wl-name{flex:1;font-size:14px;font-weight:600;}
  .wl-item.watched .wl-name{text-decoration:line-through;color:var(--ink-soft);}
  .wl-item .wl-tag{font-size:11px;background:var(--pink-soft);color:var(--pink-deep);padding:3px 8px;border-radius:999px;font-weight:700;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-size:14px;z-index:100;box-shadow:var(--shadow);animation:pop .3s;}
  @keyframes pop{from{opacity:0;transform:transl(-50%,10px);}}
  .fab-admin{position:fixed;bottom:20px;right:18px;z-index:50;background:var(--ink);color:#fff;border-radius:999px;width:auto;padding:11px 16px;font-size:13px;font-weight:600;box-shadow:var(--shadow);}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:90;}

  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);font-weight:700;margin:18px 4px 6px;}
  .reward-card{background:var(--white);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;margin-top:10px;}
  .reward-card .rc-pts{background:var(--butter);color:#5b4a14;border-radius:999px;padding:5px 11px;font-weight:700;font-size:13px;white-space:nowrap;}
  .reward-card .rc-name{flex:1;font-size:14px;font-weight:600;}
  .add-inline{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .add-inline input{flex:1;min-width:120px;padding:11px;border-radius:var(--radius-sm);border:1.5px solid var(--beige);font-size:14px;background:var(--white);}
</style>
</head>
<body>

<!-- ============ LOGIN GATE ============ -->
<div id="gate" class="gate">
  <div class="gate-card">
    <div class="logo">🛍️💕</div>
    <h1>Gina's Boutique</h1>
    <p class="sub" id="gateSub">Your personal date & treat shop. Log in to your loyalty card 💳</p>

    <div id="loginForm">
      <div class="field">
        <label>Username</label>
        <input id="liUser" autocomplete="off" placeholder="your loyalty name">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="liPass" type="password" placeholder="••••••">
      </div>
      <div class="err" id="liErr"></div>
      <button class="btn" onclick="doLogin()">Enter the boutique ✨</button>
      <button class="linkbtn" onclick="showRegister()">New here? Create your loyalty card →</button>
    </div>

    <div id="registerForm" class="hidden">
      <div class="field">
        <label>Pick a username</label>
        <input id="rgUser" autocomplete="off" placeholder="e.g. ginababy">
      </div>
      <div class="field">
        <label>Pick a password</label>
        <input id="rgPass" type="password" placeholder="something you'll remember">
      </div>
      <div class="err" id="rgErr"></div>
      <button class="btn matcha" onclick="doRegister()">Create my card 🎀</button>
      <button class="linkbtn" onclick="showLogin()">← Back to login</button>
    </div>

    <button class="linkbtn" onclick="adminPrompt()" style="margin-top:18px;opacity:.6">🔧 admin</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand" id="brand" onclick="brandTap()"><span class="heart">💕</span> <span id="brandName">Gina's Boutique</span></div>
      <div class="spacer"></div>
      <span class="pill" id="syncPill" title="Sync" style="padding:6px 9px">☁️</span>
      <span class="pill credits"><span class="ico">💳</span><span id="creditPill">200</span></span>
      <span class="pill points"><span class="ico">⭐</span><span id="pointPill">0</span></span>
      <button class="cart-btn" onclick="openCart()">🛒<span class="cart-badge hidden" id="cartBadge">0</span></button>
    </div>
    <div class="tier-row">
      <span class="tier-badge" id="tierBadge">Crush</span>
      <div class="tier-bar"><i id="tierFill" style="width:0%"></i></div>
      <span id="tierNext">to Sweetheart</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="view" id="view"></div>
</div>

<button class="fab-admin hidden" id="fabExitAdmin" onclick="exitAdmin()">Exit admin 🔧</button>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>

/* Central pricing rules — credits are an "indulgence budget" (200/month ≈ 3-4 nicer
   outings). Floor of 10 on everything so every check-in earns points; matcha & restaurants
   priced high to ration the real-money stuff. */
function repriceCats(cats){
  const lbl = c => c>=70?'$$$' : c>=35?'$$' : '$';
  const RBASE = {
    'matcha':40, 'sweet treats':20, 'desserts':20, 'brunch':50, 'healthy':45,
    'nikkei':75, 'asian / japanese':70, 'steakhouse':85, 'seafood':75,
    'italian':65, 'drinks & rooftops':55, 'late night':35
  };
  Object.keys(cats).forEach(k=>{
    if(k==='sexy') return;                 // spicy items aren't purchased; leave as-is
    cats[k].forEach(it=>{
      let c = it.cost||0;
      if(k==='restaurants'){
        const sub=(it.sub||'').toLowerCase();
        let base=null;
        for(const key in RBASE){ if(sub.indexOf(key)>-1){ base=RBASE[key]; break; } }
        c = (base!=null) ? base : Math.max(40,c);
        if(/calle dragones/i.test(it.name)) c=75;
        if(/rey de la empanada/i.test(it.name)) c=15;
      }else{
        c = Math.max(10, c);               // cheap dates stay cheap, but never free
      }
      c = Math.max(10, c);
      it.cost = c;
      it.price = lbl(c);
    });
  });
}

   ================================================================= */
let DB;
function load(){
  try{ DB = JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ DB=null; }
  if(!DB || !DB.cats){ DB = seed(); save(); }
}
function saveLocal(){ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
function save(){ saveLocal(); lastLocalWrite=Date.now(); schedulePush(); }

function setSync(state){
  const p=el('syncPill'); if(!p) return;
  const map={synced:'☁️',saving:'⏳',offline:'📴',error:'⚠️'};
  p.textContent=map[state]||'☁️';
  p.title='Sync: '+state;
}
function schedulePush(){ if(!syncOn) return; clearTimeout(pushTimer); setSync('saving'); pushTimer=setTimeout(cloudPush,700); }
async function cloudPush(){
  // SAFETY: never overwrite the shared cloud until we've successfully read it once.
  // This prevents a transient pull failure from clobbering the real data with a fresh seed.
  if(!syncOn || !cloudLoaded) return;
  const updated=new Date().toISOString();
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/app_state?on_conflict=id',{
      method:'POST',
      headers:{...SUPA_HEADERS,Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:ROW_ID,data:DB,updated_at:updated})
    });
    if(res.ok){ lastRemoteUpdated=updated; setSync('synced'); }
    else setSync('error');
  }catch(e){ setSync('offline'); }
}
// Returns {status:'ok',row} | {status:'empty'} | {status:'error'} | {status:'off'}
async function cloudPull(){
  if(!syncOn) return {status:'off'};
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/app_state?id=eq.'+ROW_ID+'&select=data,updated_at',{headers:SUPA_HEADERS});
    if(!res.ok) return {status:'error'};
    const rows=await res.json();
    return rows.length ? {status:'ok',row:rows[0]} : {status:'empty'};
  }catch(e){ return {status:'error'}; }
}
async function seedCloud(){ cloudLoaded=true; await cloudPush(); }
function applyRemote(row){
  if(!row||!row.data||!row.data.cats) return false;
  if(row.updated_at===lastRemoteUpdated) return false;
  DB=row.data; lastRemoteUpdated=row.updated_at; saveLocal(); setSync('synced');
  return true;
}
function startPolling(){
  setInterval(async()=>{
    if(!syncOn) return;
    // don't yank data away while actively editing
    if(Date.now()-lastLocalWrite<3500) return;
    if(el('modalRoot') && el('modalRoot').children.length) return;
    const ae=document.activeElement;
    if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')) return;
    const res=await cloudPull();
    if(res.status==='ok'){
      cloudLoaded=true;
      if(applyRemote(res.row)){
        if(!el('app').classList.contains('hidden')){ ensureMonth(); renderTabs(); render(); }
        else prefillGate();
      }
    } else if(res.status==='empty' && !cloudLoaded){
      seedCloud();   // row genuinely missing → safe to create it
    }
  },4000);
}

function renderCategory(v,cat){
  const meta=CAT_META[cat];
  const items=DB.cats[cat].filter(it=>ADMIN || !vetoed(it.name));
  const subs=['All',...Array.from(new Set(DB.cats[cat].map(i=>i.sub).filter(Boolean)))];
  let html=`<div class="view-head"><h2>${meta.title}</h2><p>${meta.sub}</p></div>`;
  if(subs.length>1){
    html+=`<div class="subnav">`+subs.map(s=>`<button class="chip ${subFilter===s?'active':''}" onclick="setSub('${esc(s)}')">${s}</button>`).join('')+`</div>`;
  }
  const shown=items.filter(it=>subFilter==='All'||it.sub===subFilter);
  if(ADMIN){
    html+=`<div class="add-inline">
      <input id="newItemName" placeholder="Add new item name...">
      <input id="newItemCost" type="number" placeholder="cost" style="max-width:90px">
      <button class="btn small" onclick="adminAddItem('${cat}')">+ Add</button></div>`;
  }
  html+=`<div class="grid">`;
  if(!shown.length) html+=`</div><div class="empty">Nothing here yet.</div>`;
  else { shown.forEach(it=>{ html+=cardHTML(it,cat); }); html+=`</div>`; }
  v.innerHTML=html;
}
function setSub(s){ subFilter=s; render(); }

function cardHTML(it,cat){
  const priceTag = it.price? `<span class="tag price">${it.price}</span>`:'';

  }

function moodChip(k,val,label){ return `<button class="chip ${spinMood[k]===val?'active':''}" onclick="setMood('${k}','${val}')">${label}</button>`; }
function setMood(k,v){ spinMood[k]=v; render(); }
function togglePool(id){ spinPool.includes(id)? spinPool=spinPool.filter(x=>x!==id) : spinPool.push(id); render(); }
function addSpin(){ const x=el('spinAdd').value.trim(); if(x){DB.spinnerExtra.push(x);save();render();} }
function rmSpin(i){ DB.spinnerExtra.splice(i,1);save();render(); }

function spinCandidates(){
  let pool=[];
  spinPool.forEach(cat=>{
    DB.cats[cat]?.forEach(it=>{
      if(vetoed(it.name)) return;
      if(spinMood.budget==='low' && it.cost>15) return;
      if(spinMood.setting==='home' && !['home','selfcare'].includes(cat)) return;
      if(spinMood.setting==='out' && ['home','selfcare'].includes(cat)) return;
      pool.push(it.name);
    });
  });
  DB.spinnerExtra.forEach(s=>pool.push(s));
  return pool;
}
let wheelAngle=0, spinning=false;
function drawWheel(seg){
  const c=el('wheel'); if(!c) return; const ctx=c.getContext('2d');
  const cx=150,cy=150,r=145;
  const colors=['#f7c9d6','#bcd1a6','#f6e6a8','#e88aa3','#d9c2e8','#a6d1cf'];
  const n=8;
  ctx.clearRect(0,0,300,300);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(wheelAngle);
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,r,(i/n)*2*Math.PI,((i+1)/n)*2*Math.PI);
    ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();
  }
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,26,0,2*Math.PI);ctx.fill();
  ctx.fillStyle='#e88aa3';ctx.font='20px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💕',0,0);
  ctx.restore();
}
function spin(){
  if(spinning) return;
  const cands=spinCandidates();
  if(!cands.length){ el('spinResult').innerHTML=`<div class="spin-result"><p>No matches for that mood — loosen a filter 🥲</p></div>`; return; }
  spinning=true;
  const pick=cands[Math.floor(Math.random()*cands.length)];
  const target=wheelAngle + Math.PI*2*6 + Math.random()*Math.PI*2;
  const start=wheelAngle, t0=performance.now(), dur=2600;
  function frame(t){
    const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
    wheelAngle=start+(target-start)*e; drawWheel();
    if(p<1) requestAnimationFrame(frame);
    else{ spinning=false;
      el('spinResult').innerHTML=`<div class="spin-result"><p style="color:var(--ink-soft);font-size:13px;margin:0">Tonight you're doing...</p><h3>${pick}</h3><button class="btn small" style="margin-top:10px" onclick="spin()">Spin again 🔄</button></div>`;
      confetti();
    }
  }
  requestAnimationFrame(frame);
}

  const pick=DB.giftIdeas[Math.floor(Math.random()*DB.giftIdeas.length)].name;
  const target=wheelAngle+Math.PI*2*6+Math.random()*Math.PI*2, start=wheelAngle, t0=performance.now(),dur=2600;
  function frame(t){ const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3); wheelAngle=start+(target-start)*e; drawWheel();
    if(p<1) requestAnimationFrame(frame);
    else{ spinning=false; el('giftResult').innerHTML=`<div class="spin-result"><p style="color:var(--ink-soft);font-size:13px;margin:0">Get her...</p><h3>${pick}</h3><button class="btn small" style="margin-top:10px" onclick="spinGift()">Spin again 🔄</button></div>`; confetti(); }
  }
  requestAnimationFrame(frame);
}

/* admin item CRUD */
function adminAddItem(cat){
  const name=el('newItemName').value.trim(); if(!name)return;
  const cost=parseInt(el('newItemCost').value)||0;
  DB.cats[cat].unshift({id:uid(),name,sub:subFilter!=='All'?subFilter:'',price:cost>0?'$':'Free',cost,fav:false,note:''});
  save(); render();
}
function adminDelItem(cat,id){ if(confirm('Delete this item?')){ DB.cats[cat]=DB.cats[cat].filter(i=>i.id!==id); save(); render(); } }
function adminEditItem(cat,id){
  const it=findItem(cat,id);
  const html=`<div class="modal-wrap" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>Edit item</h2>
    <div class="field"><label>Name</label><input id="eName" value="${esc(it.name)}"></div>
    <div class="field"><label>Sub-category</label><input id="eSub" value="${esc(it.sub||'')}"></div>
    <div class="field"><label>Price label ($ / $$ / $$$ / Free)</label><input id="ePrice" value="${esc(it.price||'')}"></div>
    <div class="field"><label>Cost in credits</label><input id="eCost" type="number" value="${it.cost||0}"></div>
    <div class="field"><label>Note</label><textarea id="eNote">${esc(it.note||'')}</textarea></div>
    <div class="field"><label><input type="checkbox" id="eFav" ${it.fav?'checked':''}> ⭐ Favorite</label></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveEdit('${cat}','${id}')">Save</button></div>
  </div></div>`;
  el('modalRoot').innerHTML=html;
}
function saveEdit(cat,id){
  const it=findItem(cat,id);
  it.name=el('eName').value.trim()||it.name;
  it.sub=el('eSub').value.trim();
  it.price=el('ePrice').value.trim();
  it.cost=parseInt(el('eCost').value)||0;
  it.note=el('eNote').value.trim();
  it.fav=el('eFav').checked;
  save(); closeModal(); render();
}

/* data export/import/reset */
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gina-boutique-backup.json'; a.click();
}
function importData(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ try{ DB=JSON.parse(r.result); save(); toast('Imported ✓'); render(); renderTabs(); }catch(err){ alert('Bad file'); } }; r.readAsText(f);
}
function resetAll(){ if(confirm('Wipe everything and reload defaults? This deletes Gina\'s points and history too.')){ DB=seed(); save(); toast('Reset done'); renderTabs(); render(); } }

/* =================================================================
   SECRET TAB UNLOCK ("🔒 for us" button in menu / brand)
   We expose a discreet lock button: tap brand area then a small lock.
   Implemented: the "For Us" reveal lives behind a button in the
   Self-care/Rewards footer + brand triple-tap fallback.
   ================================================================= */
let brandTaps=0,brandTimer=null;
function brandTap(){
  brandTaps++;
  clearTimeout(brandTimer);
  brandTimer=setTimeout(()=>{brandTaps=0;},800);
  if(brandTaps>=3){ brandTaps=0; revealSecret(); }
}
function revealSecret(){
  if(SECRET_UNLOCKED){ SECRET_UNLOCKED=false; if(currentTab==='sexy')currentTab='restaurants'; toast('🔒 For Us hidden'); }
  else{ SECRET_UNLOCKED=true; toast('🔓 "For Us" unlocked'); }
  renderTabs(); render();
}

/* =================================================================
   HELPERS
   ================================================================= */
function el(id){ return document.getElementById(id); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function closeModal(){ el('modalRoot').innerHTML=''; }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; el('toastRoot').appendChild(t); setTimeout(()=>t.remove(),2200); }
function confetti(){
  const c=document.createElement('div'); c.className='confetti'; document.body.appendChild(c);
  const emojis=['💕','✨','🎀','💖','🌸','⭐','💋'];
  for(let i=0;i<26;i++){
    const s=document.createElement('div'); s.textContent=emojis[i%emojis.length];
    s.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-30px;font-size:${14+Math.random()*16}px;transition:transform 1.6s ease-in,opacity 1.6s;`;
    c.appendChild(s);
    requestAnimationFrame(()=>{ s.style.transform=`translateY(${window.innerHeight+60}px) rotate(${Math.random()*540}deg)`; s.style.opacity='0'; });
  }
  setTimeout(()=>c.remove(),1700);
}

/* footer secret lock button injection */
function addSecretButton(){
  // a discreet lock button fixed bottom-left
  const b=document.createElement('button');
  b.id='secretBtn'; b.textContent='🔒';
  b.title='for us';
  b.style.cssText='position:fixed;bottom:20px;left:16px;z-index:50;background:rgba(42,34,48,.85);color:#f7c9d6;border-radius:999px;width:42px;height:42px;font-size:16px;box-shadow:var(--shadow);opacity:.55;';
  b.onclick=revealSecret;
  document.body.appendChild(b);
}

/* =================================================================
   BOOT
   ================================================================= */
function prefillGate(){
  if(DB.user && DB.user.username && DB.user.username!=='admin' && el('liUser')){
    el('liUser').value=DB.user.username;
    el('gateSub').textContent='Welcome back 💕 Log in to your loyalty card';
  }
}
async function boot(){
  load();              // instant local render-readiness
  addSecretButton();
  setSync('saving');
  const res=await cloudPull();
  if(res.status==='ok' && res.row.data && res.row.data.cats){
    cloudLoaded=true;
    DB=res.row.data; lastRemoteUpdated=res.row.updated_at; saveLocal(); setSync('synced');
  }else if(res.status==='empty'){
    // row genuinely doesn't exist yet → safe to seed the shared cloud from local
    await seedCloud();
  }else{
    // pull failed (offline / transient) → keep local, DO NOT push (would clobber the shared row).
    // Polling will keep retrying and load the cloud as soon as it's reachable.
    setSync('offline');
  }
  prefillGate();
  startPolling();
}
boot();
</script>
